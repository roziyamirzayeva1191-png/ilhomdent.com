# ============================================
# Dr Ilhom Dental Clinic — Nginx BOOTSTRAP config (HTTP-only)
#
# Bu fayl FAQAT birinchi marta SSL sertifikat olishdan oldin ishlatiladi.
# Sabab: to'liq nginx.conf 443-portda /etc/letsencrypt/... sertifikat
# fayllarini talab qiladi, lekin ular Certbot birinchi marta ishga
# tushmaguncha mavjud emas — va Certbot'ning o'ziga ACME challenge'ni
# javob berish uchun ishlayotgan Nginx kerak. Shu "tuxum-tovuq" muammosini
# hal qilish uchun avval shu HTTP-only konfiguratsiya ishga tushiriladi,
# sertifikat olinadi, so'ng asosiy nginx.conf'ga almashtiriladi.
#
# DOMENNI O'ZGARTIRING: drilhom.uz -> o'z domeningiz
# Foydalanish: DEPLOYMENT.md, 3-bosqich.
# ============================================

server {
    listen 80;
    listen [::]:80;
    server_name drilhom.uz www.drilhom.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Sertifikat olinguncha sayt HTTP orqali ishlab tursin (vaqtinchalik)
    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
