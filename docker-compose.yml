services:
  app:
    build: .
    container_name: ilhomdent-app
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    volumes:
      # Persistent runtime data survives container rebuilds
      - ./data:/app/data
      - ./backups:/app/backups
      - ./logs:/app/logs
      - ./uploads:/app/public/uploads
      # Xavfsiz deploy-signal: ilova bu yerga FAQAT bitta belgi-fayl yozadi.
      # Docker socket YO'Q — konteyner Docker'ga hech qanday tega olmaydi.
      # Haqiqiy yangilanishni host'dagi scripts/deploy-watcher.sh bajaradi.
      - ./deploy-signal:/app/deploy-signal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    container_name: ilhomdent-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Certbot SSL sertifikatlari (sudo certbot certonly --webroot ... bilan olinadi)
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # SSL avtomatik yangilanishi — har 12 soatda tekshiradi
  certbot:
    image: certbot/certbot
    container_name: ilhomdent-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
