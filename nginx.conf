# ============================================
# Dr Ilhom Dental Clinic — Nginx reverse proxy
# HTTPS + HTTP/2, gzip, kesh siyosati, xavfsizlik sarlavhalari
# DOMENNI O'ZGARTIRING: drilhom.uz -> o'z domeningiz
# ============================================

# HTTP -> HTTPS redirect (+ ACME challenge Certbot uchun)
server {
    listen 80;
    listen [::]:80;
    server_name drilhom.uz www.drilhom.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name drilhom.uz www.drilhom.uz;

    # --- SSL (Certbot / Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/drilhom.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drilhom.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 512;
    gzip_types text/plain text/css application/json application/javascript
               application/xml image/svg+xml application/manifest+json font/woff2;

    # --- Body size (rasm yuklash uchun) ---
    client_max_body_size 8m;

    # --- Proxy defaults ---
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 60s;
    }

    # --- Long cache for hashed static assets ---
    location /assets/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /uploads/ {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
